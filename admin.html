    <style>
      * {
        box-sizing: border-box;
        font-family: 'Atkinson Hyperlegible', sans-serif;
      }
      body {
        margin: 0;
      }
      header {
        padding: 20px;
        text-align: center;
        background: #595959;
        color: white;
      }
      .navbar {
        display: flex;
        background-color: #E5E5E5;
      }
      .navbar a {
        color: #595959;
        padding: 14px 20px;
        text-decoration: none;
        text-align: center;
      }
      .navbar a:hover {
        background-color: #888;
        color: black;
      }

      .container {
        display: flex;
        flex-wrap: wrap;
      }
      .side {
        height: 100%;
        width: 10vw;
        position: fixed;
        z-index: 1;
        background-color: #e5e3e3ff;
      }
      .main {
        margin-left: 10vw;
        background-color: white;
        padding: 20px;
        border: 1px dashed #AAA;
      }
      .schedule {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        padding: 15px;
      }
      .schedule div {
        display: grid;
        border: 1px solid black;
        padding: 15px;
        margin: 10px;
        text-align: center;
      }

      .schedule div table {
        margin-top: 15px;
        font-size: 12px;
      }
      /* Responsive layout - when the screen is less than 700px wide, make the two columns stack on top of each other instead of next to each other */
      @media screen and (max-width: 700px) {
        .container, .navbar {   
          flex-direction: column;
        }
      }
      /* Responsive layout - when the screen is less than 450 px wide,  */
      @media screen and (max-height: 450px) {
        .side {padding-top: 15px;}
        .side a {font-size: 18px;}
      }
    </style>
  </head>
