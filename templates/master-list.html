<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Volunteer Master List</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    margin: 0;
    padding: 24px;
    color: #1e293b;
}

.container {
    max-width: 1000px;
    margin: 0 auto;
}

h1 {
    margin-bottom: 16px;
}

.top-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 16px;
}

button {
    padding: 8px 12px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-weight: 600;
}

.primary {
    background: #2563eb;
    color: white;
}

.secondary {
    background: #64748b;
    color: white;
}

.edit {
    background: #2563eb;
    color: white;
}

.danger {
    background: #dc2626;
    color: white;
}

button:hover {
    opacity: 0.9;
}

#addForm {
    display: none;
    margin-bottom: 16px;
    background: white;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #e2e8f0;
}

#addForm input {
    padding: 6px 8px;
    margin-right: 8px;
    margin-bottom: 8px;
    border: 1px solid #cbd5e1;
    border-radius: 4px;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border-radius: 8px;
    overflow: hidden;
}

th {
    text-align: left;
    background: #e2e8f0;
    padding: 10px;
}

td {
    padding: 10px;
    border-top: 1px solid #e2e8f0;
}

tr:hover {
    background: #f8fafc;
}

.actions-cell {
    text-align: right;
}
</style>
</head>

<body>

<div class="container">

<h1>Volunteer Master List</h1>

<div class="top-actions">
    <button class="primary" onclick="toggleForm()">Add Volunteer</button>

    <form method="POST" action="/admin/sync-volunteers">
        <button class="secondary" type="submit">Update Volunteer List</button>
    </form>

    <button class="secondary" onclick="window.location.href='/admin/master-list/deleted-volunteers'">
        View Deleted
    </button>

    <button class="secondary" onclick="window.location.href='/admin'">
        Back
    </button>
</div>

<div id="addForm">
    <form method="POST" action="/admin/master-list/add-volunteer">
        <input type="text" name="first_name" placeholder="First Name" required>
        <input type="text" name="last_name" placeholder="Last Name" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="tel" name="phone" placeholder="Phone Number" required>
        <input type="checkbox" name="is_floater">
        <button class="primary" type="submit">Save</button>
    </form>
</div>

<div id="editForm">
    <form method="POST" action="/admin/master-list/edit-volunteer">
        <input type="text" name="name" id="editName" placeholder="Full Name" required style="display:none;">
        <input type="email" name="email" id="editEmail" placeholder="Email" required style="display:none;">
        <input type="tel" name="phone" id="editPhone" placeholder="Phone Number" required style="display:none;">
        <select name="role" id="editRole" style="display:none;">
            <option value="">Select Role</option>
            <option value="volunteer">Volunteer</option>
            <option value="captain">Captain</option>
            <option value="admin">Admin</option>
            <option value="tech">Tech</option>
        </select>
        <input type="checkbox" name="is_floater" id="editFloater" style="display:none;">
        <button class="primary" type="button" id="saveBtn" onclick="saveVolunteer()" style="display:none;">Save</button>
</div>

<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Phone Number</th>
            <th>Role</th>
            <th></th>
        </tr>
    </thead>

    <tbody>
        {% for v in volunteers %}
        <tr>
            <td>{{ v.first_name }} {{ v.last_name }}</td>
            <td>{{ v.email }}</td>
            <td>{{ v.phone }}</td>
            <td>{{ v.role }}</td>
            <td class="actions-cell">
                <form method="POST" action="/admin/master-list/edit-volunteer/{{ v.id }}">
                    <button class="edit" type="submit">Edit</button>
                </form>
            </td>
            <td class="actions-cell">
                <form method="POST" action="/admin/master-list/delete-volunteer/{{ v.id }}">
                    <button class="danger" type="submit"
                        onclick="return confirm('Delete this volunteer?')">
                        Delete
                    </button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

</div>

function toggleForm() {
    const form = document.getElementById("addForm");
    form.style.display = form.style.display === "none" ? "block" : "none";
