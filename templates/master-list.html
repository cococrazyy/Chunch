<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Volunteer Master List</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    margin: 0;
    padding: 24px;
    color: #1e293b;
}

.container {
    max-width: 1250px;
    margin: 0 auto;
}

h1 {
    margin-bottom: 16px;
}

.top-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 16px;
}

button {
    padding: 8px 12px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-weight: 600;
}

.primary {
    background: #2563eb;
    color: white;
}

.secondary {
    background: #64748b;
    color: white;
}

.edit {
    background: #2563eb;
    color: white;
}

.danger {
    background: #dc2626;
    color: white;
}

button:hover {
    opacity: 0.9;
}

#addForm {
    display: none;
    margin-bottom: 16px;
    background: white;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #e2e8f0;
}

#addForm input {
    padding: 6px 8px;
    margin-right: 8px;
    margin-bottom: 8px;
    border: 1px solid #cbd5e1;
    border-radius: 4px;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border-radius: 8px;
    overflow: hidden;
}

th {
    text-align: left;
    background: #e2e8f0;
    padding: 10px;
}

td {
    padding: 10px;
    border-top: 1px solid #e2e8f0;
}

tr:hover {
    background: #f8fafc;
}

.actions-cell {
    text-align: right;
}
</style>
</head>

<body>

<div class="container">

<h1>Volunteer Master List</h1>

<div class="top-actions">
    <button class="primary" onclick="toggleForm()">Add Volunteer</button>
<!--
    <form method="POST" action="/admin/sync-volunteers">
        <button class="secondary" type="submit">Update Volunteer List</button>
    </form>
-->
    <button class="secondary" onclick="window.location.href='/admin/master-list/deleted-volunteers'">
        View Deleted
    </button>

    <button class="secondary" onclick="window.location.href='/admin'">
        Back
    </button>
</div>

<div id="addForm">
    <form method="POST" action="/admin/master-list/add-volunteer">
        <input type="text" name="first_name" placeholder="First Name" required>
        <input type="text" name="last_name" placeholder="Last Name" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="tel" name="phone" placeholder="Phone Number">
        <select name="station_id">
            <option value="">Select Station</option>
            <option value="1">Setup Team</option>
            <option value="2">Teardown Team</option>
            <option value="3">Line Servers</option>
            <option value="4">Kitchen</option>
            <option value="5">Drinks</option>
            <option value="6">Desserts</option>
            <option value="7">Busboys/sanitation</option>
            <option value="8">Dishwashers</option>
            <option value="9">Reserve</option>
            <option value="10">General Manager</option>
            <option value="11">Greeters</option>
            <option value="12">Baked Potato Bar</option>
            <option value="13">Salad Bar</option>
            <!-- <option value="14">Absent</option> -->
            <!-- <option value="15">Other</option> -->
            <option value="16">Vegan</option>
        </select>
        <!-- Add an if statement somewhere that sets the station to 9 if none are selected -->
        
        <select name="role">
            <option value="">Select Role</option>
            <option value="1">Volunteer</option>
            <option value="2">Admin</option>
            <option value="3">Captain</option>
            <option value="4">Tech</option>
        </select>

        <label>Start Hour:</label>
        <select name="start_hour" required>
            {% for h in range(0, 24) %}
                <option value="{{ h }}">{{ h }}:00</option>
            {% endfor %}
        </select>
        <label>End Hour:</label>
        <select name="end_hour" required>
            {% for h in range(1, 25) %}
                <option value="{{ h }}">{{ h }}:00</option>
            {% endfor %}
        </select>
        
        <!-- Floater input -->
        <label for="floater">Floater: </label>
        <input type="checkbox" name="is_floater" id="floater">

        <button class="primary" type="submit">Save</button>
    </form>
</div>

<div id="editForm">
    <form method="POST" action="/admin/master-list/edit-volunteer">
        <input type="text" name="first_name" id="editFirstName" style="display:none;">
        <input type="text" name="last_name" id="editLastName" style="display:none;">
        <input type="email" name="email" id="editEmail" style="display:none;">
        <input type="tel" name="phone" id="editPhone" style="display:none;">
        <select name="editRole" id="editRole" style="display:none;">
            <option value="">Select Role</option>
            <option value="volunteer">Volunteer</option>
            <option value="captain">Captain</option>
            <option value="admin">Admin</option>
            <option value="tech">Tech</option>
        </select>
        <input type="checkbox" name="is_floater" id="editFloater" style="display:none;">
        <button class="primary" type="button" id="saveBtn" onclick="saveVolunteer()" style="display:none;">Save</button>
</div>

<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Phone Number</th>
            <th>Role</th>
            <th>Station</th>
        </tr>
    </thead>

    <tbody>
        {% for v in volunteers %}
        <tr id="view-row-{{ v.id }}">
            <td>{{ v.first_name }} {{ v.last_name }}</td>
            <td>{{ v.email }}</td>
            <td>{{ v.phone }}</td>
            <td>{{ v.role }}</td>
            <td>{{ v.station }}</td>
            <td class="actions-cell">
                <button class="edit" type="button" onclick="enableEdit({{ v.id }})">Edit</button>
            </td>
            <td class="actions-cell">
                <form method="POST" action="/admin/master-list/delete-volunteer/{{ v.id }}">
                    <button class="danger" type="submit"
                        onclick="return confirm('Delete this volunteer?')">
                        Delete
                    </button>
                </form>
            </td>
        </tr>
        <tr id="edit-row-{{ v.id }}" class="inline-edit-row" hidden>
            <td colspan="6">
                <form method="POST" action="/admin/master-list/edit-volunteer/{{ v.id }}" class="inline-edit-form">
                    <div class="form-row">
                        <input type="text" name="first_name" value="{{ v.first_name }}">

                        <input type="text" name="last_name" value="{{ v.last_name }}">

                        <input type="email" name="email" value="{{ v.email }}">

                        <input type="tel" name="phone" placeholder="Phone Number" value="{{ v.phone }}"> 
                        <br>
                        <input type="text" name="unavailability" placeholder="Unavailability" value="{{ v.unavailability }}">

                        <input type="text" name="capability_restrictions" placeholder="Capability Restrictions"
                            value="{{ v.capability_restrictions }}">
                        <br>
                        <select name="station_id">
                            <option value="">Select Station</option>
                            <option value="1" {% if v.station_id == 1 %}selected{% endif %}>Setup Team</option>
                            <option value="2" {% if v.station_id == 2 %}selected{% endif %}>Teardown Team</option>
                            <option value="3" {% if v.station_id == 3 %}selected{% endif %}>Line Servers</option>
                            <option value="4" {% if v.station_id == 4 %}selected{% endif %}>Kitchen</option>
                            <option value="5" {% if v.station_id == 5 %}selected{% endif %}>Drinks</option>
                            <option value="6" {% if v.station_id == 6 %}selected{% endif %}>Desserts</option>
                            <option value="7" {% if v.station_id == 7 %}selected{% endif %}>Busboys/sanitation</option>
                            <option value="8" {% if v.station_id == 8 %}selected{% endif %}>Dishwashers</option>
                            <option value="9" {% if v.station_id == 9 %}selected{% endif %}>Reserve</option>
                            <option value="10" {% if v.station_id == 10 %}selected{% endif %}>General Manager</option>
                            <option value="11" {% if v.station_id == 11 %}selected{% endif %}>Greeters</option>
                            <option value="12" {% if v.station_id == 12 %}selected{% endif %}>Baked Potato Bar</option>
                            <option value="13" {% if v.station_id == 13 %}selected{% endif %}>Salad Bar</option>
                            <!-- <option value="14" {% if v.station_id == 14 %}selected{% endif %}>Absent</option> -->
                            <!-- <option value="15" {% if v.station_id == 15 %}selected{% endif %}>Other</option> -->
                            <option value="16" {% if v.station_id == 16 %}selected{% endif %}>Vegan</option>
                        </select>

                        <label for="start_hour_{{ v.id }}">Start Hour:</label>
                        <input type="number" name="start_hour" id="start_hour_{{ v.id }}" min="0" max="23"
                            value="{{ v.start_hour if v.start_hour is not none else '' }}">

                        <label for="end_hour_{{ v.id }}">End Hour:</label>
                        <input type="number" name="end_hour" id="end_hour_{{ v.id }}" min="1" max="24"
                            value="{{ v.end_hour if v.end_hour is not none else '' }}">

                        <!-- Check again, what is this for? Doesn't match the floater in other locations? -->
                        <span class="checkbox-wrap">
                            <label for="editFloater">Floater:</label>
                            <input type="checkbox" name="floater" id="editFloater" 
                                {% if v.is_floater %} checked {% endif %}>
                        </span>
                    </div>

                    <!-- What is this for? It seems like there is an error using interpolation within a JavaScript command -->
                    <div class="button-row">
                        <button class="primary" type="submit">Save Changes</button>
                        <button class="cancel" type="button" onclick="cancelEdit({{ v.id }})">Cancel</button>
                    </div>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

</div>

<script>
function toggleForm() {
    const form = document.getElementById("addForm");
    form.style.display = form.style.display === "none" ? "block" : "none";
}
    
function enableEdit(id) {
    const editRow = document.getElementById(`edit-row-${id}`);
    if (editRow) {
        editRow.hidden=false;
    }
}

function cancelEdit(id) {
    const editRow = document.getElementById(`edit-row-${id}`);
    if (editRow) {
        editRow.hidden=true;
    }
}

function editVolunteer() {
    if(!currentVolunteer) return;
    document.getElementById("first_name").style.display = "none";
    document.getElementById("last_name").style.display = "none";
    document.getElementById("email").style.display = "none";
    document.getElementById("phone").style.display = "none";
    document.getElementById("station").style.display = "none";
    document.getElementById("role").style.display = "none";

    const nameInput = document.getElementById("editName");
    const emailInput = document.getElementById("editEmail");
    const phoneInput = document.getElementById("editPhone");
    const captainInput = document.getElementById("editRole");

    // added for station
    const stationSelect = document.getElementById("editStation");
    const roleSelect = document.getElementById("editRole");
    
    nameInput.style.display = "inline";
    emailInput.style.display = "inline";
    phoneInput.style.display = "inline";
    
    // shiftInput.style.display = "inline";
    // unavailabilityInput.style.display = "inline";
    // restrictionsInput.style.display = "inline";
    // captainInput.style.display = "inline";
    // stationSelect.style.display = "inline";
    
    nameInput.value = currentVolunteer.name || "";
    emailInput.value = currentVolunteer.email || "";
    phoneInput.value = currentVolunteer.phone || "";
    shiftInput.value = currentVolunteer.typical_shift || "";
    unavailabilityInput.value = currentVolunteer.unavailability || "";
    restrictionsInput.value = currentVolunteer.capability_restrictions || "";
    captainInput.value = currentVolunteer.role || "";
    
    stationSelect.innerHTML = "";

    const stations = [
        // { id: 14, name: "Absent" },
        { id: 12, name: "Baked Potato Bar" },
        { id: 7, name: "Busboys/sanitation" },
        { id: 6, name: "Desserts" },
        { id: 8, name: "Dishwashers" },
        { id: 5, name: "Drink Station" },
        { id: 10, name: "General Manager" },
        { id: 11, name: "Greeters" },
        { id: 4, name: "Kitchen" },
        { id: 3, name: "Line Servers" },
        // { id: 15, name: "Other" },
        { id: 9, name: "Reserve" },
        { id: 13, name: "Salad Bar" },
        { id: 1, name: "Setup Team" },
        { id: 2, name: "Teardown Team" },
        { id: 16, name: "Vegan" }
    ];

    stations.forEach(station => {
        const option = document.createElement("option");
        option.value = station.id;      // numeric ID
        option.textContent = station.name;

        if (station.id === currentVolunteer.station_id) { // use numeric comparison
            option.selected = true;
        }

        stationSelect.appendChild(option);
    });
    stationSelect.value = currentVolunteer.station_id || "";
    document.getElementById("editBtn").style.display = "none";
    document.getElementById("saveBtn").style.display = "inline-block";
    
}

function saveVolunteer() {
    const fullName = document.getElementById("editName").value.trim();
    const [firstName, ...rest] = fullName.split(" ");
    const lastName = rest.join(" ");
    // added for station
    const stationSelect = document.getElementById("editStation");
    const stationId = stationSelect.value;
    const updatedData = {
        id: currentVolunteer.id,
        first_name: firstName,
        last_name: lastName,
        email: document.getElementById("editEmail").value,
        phone: document.getElementById("editPhone").value, 
        typical_shift: document.getElementById("editShift").value,
        unavailability: document.getElementById("editUnavailability").value,
        capability_restrictions: document.getElementById("editRestrictions").value,
        role: document.getElementById("editRole").value,
        // added for station
        station_id: document.getElementById("editStation").value
    };

    fetch("/admin/edit-volunteer", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(updatedData)
    })
    .then(res => res.json())
    .then(data => {
        window.location.reload();
    })
    .catch(err => console.error(err));

    // reload station board to show new update
    //loadStationBoard()
}

// Added for edit

document.addEventListener("click", function (e) {
    if (!isSelectionLocked) return;

    const isVolunteer = e.target.closest(".volunteer-pill");
    const isEditButton = e.target.closest("button[onclick='enableEdit()']");

    if (isVolunteer || isEditButton) return;

    // BLOCK everything else
    e.stopPropagation();
    e.preventDefault();
}, true);

</script>

</body>
</html>
