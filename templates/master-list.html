<!DOCTYPE HTML>
<HTML>
  <body>
    <h1 This is the master list>
      <table border="1" cellpadding="6">
        <tr>
            <th>Name</th>
            <th>Email</th>
        </tr>

        {% for v in volunteers %}
        <tr>
            <td>{{ v.first_name }} {{ v.last_name }}</td>
            <td>{{ v.email }}</td>
        </tr>
        {% endfor %}
    </table>
  </body>
</HTML>
