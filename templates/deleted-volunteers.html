<!DOCTYPE html>
<html>
  <table border="1" cellpadding="6">
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Phone Number</th>
        </tr>

        {% for d in deleted %}
        <tr>
            <td>{{ d.first_name }} {{ d.last_name }}</td>
            <td>{{ d.email }}</td>
            <td>{{ d.phone }}</td>
        </tr>
        {% endfor %}
    </table>
</html>
