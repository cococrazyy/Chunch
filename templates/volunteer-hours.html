<!DOCTYPE html>
<html>
<head>
    <title>Volunteer Hours</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Volunteer Hours</h1>

    <canvas id="hoursChart"></canvas>

<script>
    const data = JSON.parse('{{ volunteer_data | tojson | safe }}');
    const labels = data.map(v => v.name);
    const hoursWorked = data.map(v => v.hours.length);

    const ctx = document.getElementById('hoursChart').getContext('2d');

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Hours Worked',
                data: hoursWorked
            }]
        },
        options: {
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
</script>
</body>
</html>
