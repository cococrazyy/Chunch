<!DOCTYPE html>
<html>
<head>
    <title>Volunteer Hours</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>TEST Hours</h1>

    <canvas id="hoursChart"></canvas>

<script>
    const data = {{ volunteer_data | tojson | safe }};

    const labels = data.map(v => v.name);
    const hoursWorked = data.map(v => {
        if (!v.hours || v.hours.length === 0) return 5;
        return Math.max(...v.hours);
    });

    const ctx = document.getElementById('hoursChart').getContext('2d');

  new Chart(ctx, {
    type: 'bar',
    data: {
        labels: labels,
        datasets: [{
            label: 'Hours Worked',
            data: hoursWorked,
            backgroundColor: '#4e79a7', // solid color for now
            barThickness: 20
        }]
    },
    options: {
        indexAxis: 'x', // ensures vertical bars
        scales: {
            y: {
                min: 5,
                max: 16,
                ticks: {
                    stepSize: 1,
                    callback: function(value) {
                        if (value === 0) return '12AM';
                        if (value < 12) return value + 'AM';
                        if (value === 12) return '12PM';
                        return (value - 12) + 'PM';
                    }
                }
            },
            x: {
                title: {
                    display: true,
                    text: 'Volunteers'
                }
            }
        }
    }
});
</script>
</body>
</html>
