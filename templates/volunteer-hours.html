<!-- 
    This file contains the HTML and JavaScript code that creates the hourly
    volunteer‑coverage view. It displays each station’s volunteer time ranges
    using a Chart.js bar visualization. This page is accessible only to admins
    and captains and includes navigation back to their respective dashboards.
-->
<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Volunteer Hours by Station</title>

    <!-- Import stylesheet for hourly view layout -->
    <link rel="stylesheet" href="/style/hourly-view.css">

    <!-- Chart.js for rendering hourly bar charts -->
    <!-- TODO: Descript this script -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="container">

    <!-- Page header with navigation and print controls -->
    <div class="top-bar">
        <h1>Volunteer Hours by Station</h1>
        <div class="top-bar-actions">
            <button onclick="window.location.href='/admin'">Back to Dashboard</button>
            <button onclick="printCurrentChart()">Print Current Chart</button>
        </div>
    </div>

    <!-- Station selector -->
    <div class="controls">
        <label for="stationSelect">Select Station:</label>
        <select id="stationSelect"></select>
    </div>

    <!-- Chart display card -->
    <div class="chart-card">
        <h2 id="stationHeading" class="station-heading"></h2>
        <div id="chartWrapper">
            <canvas id="hoursChart"></canvas>
        </div>
    </div>

</div>

<script>
    // Station data injected from backend
    const stationData = {{ station_data | tojson | safe }};

    // Stations excluded from hourly visualization
    const blockedStations = ["Reserve", "Absent", "Other"];

    // Filter valid stations for selection
    const stationNames = Object.keys(stationData).filter(
        stationName => !blockedStations.includes(stationName)
    );

    // DOM references
    const stationSelect = document.getElementById('stationSelect');
    const stationHeading = document.getElementById('stationHeading');
    const ctx = document.getElementById('hoursChart').getContext('2d');

    let hoursChart = null;
    let currentStationName = "";

    // Convert numeric hour to readable label
    function formatHourLabel(value) {
        if (value === 12) return "12PM";
        if (value < 12) return value + "AM";
        return (value - 12) + "PM";
    }

    // Build Chart.js datasets from volunteer time ranges
    function buildDatasets(volunteers) {
        const datasets = [];

        volunteers.forEach((volunteer, volunteerIndex) => {
            if (!volunteer.ranges || volunteer.ranges.length === 0) {
                return;
            }

            volunteer.ranges.forEach((range, rangeIndex) => {
                const startHour = range[0];
                const endHour = range[1];

                datasets.push({
                    label: rangeIndex === 0 ? volunteer.name : "",
                    data: volunteers.map((v, i) => {
                        if (i !== volunteerIndex) return null;
                        return [startHour, endHour];
                    }),
                    borderWidth: 1,
                    grouped: false,
                    barThickness: 45,
                    maxBarThickness: 45,
                    categoryPercentage: 1
                });
            });
        });

        // Fallback dataset when no hours exist
        if (datasets.length === 0) {
            datasets.push({
                label: "No scheduled hours",
                data: volunteers.map(() => null),
                borderWidth: 1,
                grouped: false,
                barThickness: 26,
                maxBarThickness: 26,
                categoryPercentage: 0.9
            });
        }

        return datasets;
    }

    // Render the hourly chart for a selected station
    function renderChart(stationName) {
        currentStationName = stationName;
        const volunteers = stationData[stationName] || [];
        const labels = volunteers.map(v => v.name);

        stationHeading.textContent = stationName;

        // Destroy existing chart before re-rendering
        if (hoursChart) {
            hoursChart.destroy();
        }

        hoursChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: buildDatasets(volunteers)
            },
            options: {
                indexAxis: 'x',
                responsive: true,
                maintainAspectRatio: false,
                animation: false,
                layout: {
                    padding: { top: 6 }
                },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                const volunteer = volunteers[context.dataIndex];
                                if (!volunteer || !volunteer.range_label) return "";
                                return volunteer.name + ": " + volunteer.range_label;
                            }
                        }
                    },
                    title: { display: false }
                },
                scales: {
                    x: {
                        offset: true,
                        ticks: {
                            maxRotation: 45,
                            minRotation: 45,
                            autoSkip: false
                        },
                        grid: { display: false }
                    },
                    y: {
                        reverse: true,
                        min: 5,
                        max: 16,
                        ticks: {
                            stepSize: 1,
                            callback: function(value) {
                                return formatHourLabel(value);
                            }
                        },
                        title: {
                            display: true,
                            text: 'Hour'
                        }
                    }
                }
            }
        });
    }

    // Print the currently displayed chart
    function printCurrentChart() {
        if (hoursChart) {
            hoursChart.resize();
            setTimeout(() => {
                window.print();
            }, 100);
        } else {
            window.print();
        }
    }

    // Ensure chart renders correctly before and after printing
    window.addEventListener('beforeprint', () => {
        if (hoursChart) {
            hoursChart.resize();
            hoursChart.update('none');
        }
    });

    window.addEventListener('afterprint', () => {
        if (hoursChart) {
            hoursChart.resize();
            hoursChart.update('none');
        }
    });

    // Populate station dropdown
    stationNames.forEach(stationName => {
        const option = document.createElement('option');
        option.value = stationName;
        option.textContent = stationName;
        stationSelect.appendChild(option);
    });

    // Auto-load first station chart
    if (stationNames.length > 0) {
        stationSelect.value = stationNames[0];
        renderChart(stationNames[0]);
    }

    // Re-render chart when station selection changes
    stationSelect.addEventListener('change', function() {
        renderChart(this.value);
    });
</script>
</body>
</html>
