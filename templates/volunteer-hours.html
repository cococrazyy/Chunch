<!DOCTYPE html>
<html>
<head>
    <title>Volunteer Hours</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>TEST Hours</h1>

    <canvas id="hoursChart"></canvas>

<script>
    const data = {{ volunteer_data | tojson | safe }};

    const labels = data.map(v => v.name);
    const hoursWorked = data.map(v => {
        if (!v.hours || v.hours.length === 0) return 5;
        return Math.max(...v.hours);
    });

    const ctx = document.getElementById('hoursChart').getContext('2d');

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Hours Worked',
                data: hoursWorked,
                backgroundColor: 'rgba(54, 162, 235, 0.6)',
                borderColor: 'rgba(54, 162, 235, 1)',
                borderWidth: 1
            }]
        },
        options: {
            indexAxis: 'y', // optional if you want horizontal bars
            scales: {
                y: {
                    min: 5,
                    max: 16,
                    reverse: true,   // <-- this reverses the axis
                    ticks: {
                        callback: function(value) {
                            if (value === 12) return "12PM";
                            if (value < 12) return value + "AM";
                            return (value - 12) + "PM";
                        }
                    }
                }
            }
        }
    });
</script>
</body>
</html>
