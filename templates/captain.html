<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Captain Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://apis.google.com/js/platform.js" async defer></script>
<script src="admin_captain_shared.js"></script>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background: #f3f6fb;
    color: #1e293b;
}

.header {
    background: #0f172a;
    color: white;
    padding: 24px 32px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    box-shadow: 0 10px 25px rgba(15, 23, 42, 0.18);
}

.header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 20px;
    flex-wrap: wrap;
}

.header-copy h1 {
    font-size: 32px;
    font-weight: 800;
    margin-bottom: 6px;
}

.header-tools {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
}

.date-picker {
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid #cbd5e1;
    font-size: 14px;
    background: white;
    color: #0f172a;
    width: 100%;
}

.detail-panel {
    position: fixed;
    top: 0;
    right: -460px;
    width: 420px;
    max-width: 92vw;
    height: 100vh;
    background: white;
    box-shadow: -10px 0 30px rgba(15, 23, 42, 0.2);
    z-index: 1000;
    transition: right 0.25s ease;
    display: flex;
    flex-direction: column;
}

.detail-panel.open {
    right: 0;
}

.detail-panel-header {
    padding: 22px 22px 16px;
    border-bottom: 1px solid #e2e8f0;
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: center;
}

.detail-panel-title {
    font-size: 22px;
    font-weight: 800;
    color: #0f172a;
}

.detail-panel-actions {
    display: flex;
    gap: 8px;
}

.detail-btn {
    border: none;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
}

.detail-btn.back {
    background: #e2e8f0;
    color: #0f172a;
}

.detail-btn.edit {
    background: #2563eb;
    color: white;
}

.detail-panel-body {
    padding: 22px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
}

.detail-card {
    border: 1px solid #e2e8f0;
    border-radius: 14px;
    padding: 16px;
    background: #f8fafc;
}

.detail-label {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: #64748b;
    margin-bottom: 6px;
}

.detail-value {
    font-size: 15px;
    font-weight: 600;
    color: #0f172a;
    word-break: break-word;
}

.detail-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.28);
    z-index: 999;
    display: none;
}

.detail-overlay.open {
    display: block;
}

.load-btn,
.header button {
    padding: 10px 16px;
    border-radius: 12px;
    border: none;
    background: #2563eb;
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s ease;
    font-size: 14px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
}

.load-btn:hover,
.header button:hover {
    background: #1d4ed8;
}

.secondary-btn {
    background: #475569 !important;
}

.secondary-btn:hover {
    background: #334155 !important;
}

.header-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

button.logout-btn {
    align-items: right;
    background: rgb(107,29,29);
}
button.logout-btn:hover { background: rgb(178, 59, 59); }

.icon {
    font-size: 18px;
    line-height: 1;
}

.label {
    font-size: 14px;
    font-weight: 600;
}

.page {
    padding: 32px;
}

.board-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
    gap: 12px;
    flex-wrap: wrap;
}

.board-header h2 {
    font-size: 24px;
    font-weight: 800;
    color: #0f172a;
}

.board-header p {
    color: #64748b;
    font-size: 14px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 22px;
}

.card {
    border-radius: 22px;
    padding: 22px;
    color: white;
    box-shadow: 0 14px 32px rgba(0,0,0,0.12);
    transition: transform 0.18s ease, box-shadow 0.18s ease;
    min-height: 220px;
    display: flex;
    flex-direction: column;
}

.card:hover {
    transform: translateY(-4px);
    box-shadow: 0 18px 36px rgba(0,0,0,0.16);
}

.card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 18px;
}

.card h3 {
    font-size: 20px;
    font-weight: 800;
    line-height: 1.2;
}
.station-count {
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.22);
    border-radius: 999px;
    padding: 6px 10px;
    font-size: 12px;
    font-weight: 700;
    white-space: nowrap;
}
.volunteer-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 4px;

    /* added for scroll bar */
    max-height: 260px;   /* controls how many show (about 5) */
    overflow-y: auto;    /* enables vertical scroll */
    padding-right: 6px;  /* space for scrollbar */
}

.volunteer-pill {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 12px;
    padding: 10px 12px;
    font-size: 14px;
    font-weight: 600;
    line-height: 1.35;
    width: 100%;
    text-align: left;
    color: inherit;
    cursor: pointer;
    transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
}

.volunteer-pill:hover {
    transform: translateY(-2px);
    background: rgba(255,255,255,0.28);
    border-color: rgba(255,255,255,0.4);
}

.volunteer-pill:focus {
    outline: 2px solid rgba(255,255,255,0.65);
    outline-offset: 2px;
}

.empty-state {
    margin-top: 6px;
    background: rgba(255,255,255,0.12);
    border: 1px dashed rgba(255,255,255,0.28);
    border-radius: 12px;
    padding: 14px;
    font-size: 14px;
    color: rgba(255,255,255,0.9);
}

.setup { background: linear-gradient(135deg,#0ea5e9,#0284c7); }
.teardown { background: linear-gradient(135deg,#6366f1,#4f46e5); }
.servers { background: linear-gradient(135deg,#ef4444,#dc2626); }
.kitchen { background: linear-gradient(135deg,#22c55e,#16a34a); }
.drinks { background: linear-gradient(135deg,#f97316,#ea580c); }
.desserts { background: linear-gradient(135deg,#facc15,#eab308); color: #1e293b; }
.busboys { background: linear-gradient(135deg,#ec4899,#db2777); }
.dishes { background: linear-gradient(135deg,#06b6d4,#0891b2); }
.reserve { background: linear-gradient(135deg,#94a3b8,#64748b); }
.manager { background: linear-gradient(135deg,#111827,#1f2937); }
.greeters { background: linear-gradient(135deg,#14b8a6,#0d9488); }
.potato { background: linear-gradient(135deg,#a16207,#854d0e); }
.salad { background: linear-gradient(135deg,#65a30d,#4d7c0f); }
.vegan{ background: linear-gradient(135deg, #00ff91, #00ac62); }
.absent { background: linear-gradient(135deg,#dc2626,#7f1d1d); }
.other { background: linear-gradient(135deg,#64748b,#475569); }

.desserts .volunteer-pill,
.desserts .empty-state {
    color: #1e293b;
    background: rgba(255,255,255,0.4);
    border-color: rgba(255,255,255,0.45);
}

@media (max-width: 768px) {
    .header,
    .page {
        padding: 20px 16px;
    }

    .header-copy h1 {
        font-size: 26px;
    }

    .grid {
        grid-template-columns: 1fr;
    }
}
</style>
</head>
<body>

<div class="header">
    <div class="header-top">
        <div class="header-copy">
            <h1>Captain Dashboard</h1>
        </div>
    </div>

    <div class="header-actions">
        <button onclick="window.location.href='/captain/volunteer-hours-cap'">
            <span class="icon">⏱️</span>
            <span class="label">Hourly View</span>
        </button>

        <button onclick="window.location.href='/absence-forms'">
            <span class="icon">📄</span>
            <span class="label">Absence Forms</span>
        </button>
        <!-- <button class="logout-btn" onclick="signOut();">
            <span class="icon">🚪</span>
            <span class="label">Sign Out</span>
        </button> -->
    </div>
</div>

    <div class="board-header">
        <div>
            <h2>Station Board</h2>
            <p>All stations with the volunteers currently assigned to each one.</p>
        </div>

    <div class="grid" id="scheduleGrid"></div>
</div>

function formatDatePretty(dateStr) {
    if (!dateStr) return "";
    const d = new Date(dateStr);
    return d.toLocaleDateString(undefined, {
        month: "long",
        day: "numeric"
    });
}

function formatHourPretty(h) {
    if (h === null || h === undefined) return "";
    if (h === 0) return "12 AM";
    if (h < 12) return `${h} AM`;
    if (h === 12) return "12 PM";
    return `${h - 12} PM`;
}

// Make the phone number more readable e.g. (123) 456-7890 or +1 (123) 456-7890
function formatPhonePretty(phone) {
    if (phone.length === 10) {
        return `(${phone.slice(0,3)}) ${phone.slice(3,6)}-${phone.slice(6)}`;
    } else if (phone.length === 11 && phone[0] === '1') {
        return `+1 (${phone.slice(1,4)}) ${phone.slice(4,7)}-${phone.slice(7)}`;
    }
    return phone;
}

async function loadStationBoard() {
    try {
        const response = await fetch("/admin/debug-hourly-final");
        const stationData = await response.json();

        stationData.data

        if (!response.ok || stationData.error) {
            throw new Error(stationData.error || "Failed to load station board response.");
        }

        //renderStationBoard(stationData);
        renderStationBoard({
            stationData,
            stationClassMap,
            getVolunteerDisplayName,
            isCaptain,
            isAdmin,
            openVolunteerPanel
        });
    } catch (error) {
        document.getElementById("scheduleGrid").innerHTML = `
        <div style="background:white;border-radius:16px;padding:20px;border:1px solid #e2e8f0;">
            Failed to load station board ${error}.
        </div>
        `;
    }
}

async function loadSchedule() {
    const date = document.getElementById("datePicker").value;

    if (!date) {
        alert("Please select a date.");
        return;
    }

    try {
        const response = await fetch(`/api/schedule?date=${date}`);
        const data = await response.json();

        const converted = {};
        data.forEach(station => {
            converted[station.stationName] = {
                volunteers: station.volunteers || []
            };
        });

        renderStationBoard(converted);
    } catch (error) {
        alert("Could not load that schedule.");
    }
}

function closeVolunteerPanel() {
    document.getElementById("detailPanel").classList.remove("open");
    document.getElementById("detailOverlay").classList.remove("open");

    document.getElementById("detailName").style.display = "inline";
    document.getElementById("detailEmail").style.display = "block";
    document.getElementById("detailPhone").style.display = "block";

    currentVolunteer = null;
}

}
