<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Captain Dashboard</title>

    <!-- Import font & style -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style/captain.css">

    <!-- import API script -->
    <script src="https://apis.google.com/js/platform.js" async defer></script>
</head>
<body>

<div class="header">
    <div class="header-top">
        <h1>Captain Dashboard</h1>
    </div>

    <div class="header-actions">
        <button onclick="window.location.href='/admin/volunteer-hours'">
            <span class="icon">⏱️</span>
            <span class="label">Hourly View</span>
        </button>
        <button onclick="window.location.href='/admin/need-coverage'">
            <span class="icon">🚨</span>
            <span class="label">Need Coverage?</span>
        </button>
        <button onclick="window.location.href='/admin/absences'">
            <span class="icon">📄</span>
            <span class="label">Absence Forms</span>
        </button>
    </div>
</div>

<div class="page">
    <div class="board-header">
        <div>
            <h2>Station Board</h2>
            <p>All stations with the volunteers currently assigned to each one.</p>
        </div>
    </div>

    <div class="grid" id="scheduleGrid"></div>
</div>

<script>
let currentVolunteer = null;
// Connects stations to dashboard
const stationClassMap = {
    "Setup Team": "setup",
    "Teardown Team": "teardown",
    "Line Servers": "servers",
    "Kitchen": "kitchen",
    "Drink Station": "drinks",
    "Desserts": "desserts",
    "Busboys/sanitation": "busboys",
    "Dishwashers": "dishes",
    "Reserve": "reserve",
    "General Manager": "manager",
    "Greeters": "greeters",
    "Baked Potato Bar": "potato",
    "Salad Bar": "salad",
    "Vegan Station": "vegan",
    "Absent": "absent",
    "Other": "other"
};

// Initialize station data empty
let currentStationData = {};
let currentAbsentEditVolunteer = null;

function formatCountLabel(count) {
    return count === 1 ? "1 volunteer" : `${count} volunteers`;
}

function getVolunteerDisplayName(volunteer) {
    if (typeof volunteer === "string") return volunteer;
    return volunteer.name || `${volunteer.firstName || ""} ${volunteer.lastName || ""}`.trim();
}

// Seeing if volunteer is a captain
function isCaptain(volunteer) {
    if (!volunteer || typeof volunteer === "string") return false;

    const captainStatus = (volunteer.captain_status || volunteer.captainStatus || "").toString().toLowerCase();
    const role = (volunteer.role || "").toString().toLowerCase();

    return captainStatus === "captain" || role === "captain";
}

// Seeing if volunteer is a admin
function isAdmin(volunteer) {
    if (!volunteer || typeof volunteer === "string") return false;
    return (volunteer.role || "").toString().toLowerCase() === "admin";
}

// Seeing if volunteer is a tech
function isTech(volunteer) {
    if(!volunteer || typeof volunteer === "string") return false;
    return (volunteer.role || "").toString().toLowerCase() === "tech";
}

function formatDatePretty(dateStr) {
    if (!dateStr) return "";
    const d = new Date(dateStr);
    return d.toLocaleDateString(undefined, {
        month: "long",
        day: "numeric"
    });
}

// Makes hours into AM and PM
function formatHourPretty(h) {
    if (h === null || h === undefined) return "";
    if (h === 0) return "12 AM";
    if (h < 12) return `${h} AM`;
    if (h === 12) return "12 PM";
    return `${h - 12} PM`;
}

// Make the phone number more readable e.g. (123) 456-7890 or +1 (123) 456-7890
function formatPhonePretty(phone) {
    if (phone.length === 10) {
        return `(${phone.slice(0,3)}) ${phone.slice(3,6)}-${phone.slice(6)}`;
    } else if (phone.length === 11 && phone[0] === '1') {
        return `+1 (${phone.slice(1,4)}) ${phone.slice(4,7)}-${phone.slice(7)}`;
    }
    return phone;
}

// The station board, its information for each volunteer, and how it shows/looks
function renderStationBoard(stationData) {
    currentStationData = stationData || {};

    const grid = document.getElementById("scheduleGrid");
    grid.innerHTML = "";

    const stationNames = Object.keys(stationData);
    let totalVolunteers = 0; // Used for debugging/checking that counts are correct
    let assignedVolunteers = 0;

    const seenVolunteerKeys = new Set();
    const seenCaptainKeys = new Set();

    stationNames.forEach(stationName => {
        if (stationName === "Other") return;

        const station = stationData[stationName];
        //const volunteers = station.volunteers || [];

        // added for A-Z stations
        let volunteers = (station.volunteers || []).slice(); // copy so we don't mutate original

        volunteers.sort((a, b) => {
            const roleA = (a.role || "").toLowerCase();
            const roleB = (b.role || "").toLowerCase();

            // Priority: admin (0), captain (1), others (2)
            const getPriority = (role) => {
                if (role === "admin") return 0;
                if (role === "captain") return 1;
                return 2;
            };

            const priorityA = getPriority(roleA);
            const priorityB = getPriority(roleB);

            if (priorityA !== priorityB) {
                return priorityA - priorityB;
            }

            // Same role, sort alphabetically
            const nameA = (a.name || "").toLowerCase();
            const nameB = (b.name || "").toLowerCase();

            return nameA.localeCompare(nameB);
        });

        totalVolunteers += volunteers.length;

        const card = document.createElement("div");
        const cssClass = stationClassMap[stationName];
        if (!cssClass) return;

        card.className = `card ${cssClass}`;

        let volunteerHTML = "";

        if (volunteers.length > 0) {
            volunteerHTML = `
                <div class="volunteer-list">
                    ${volunteers.map(volunteer => {
                        const displayName = getVolunteerDisplayName(volunteer);
                        const uniqueKey =
                            typeof volunteer === "string"
                                ? displayName
                                : (volunteer.id ?? displayName);

                        if (!seenVolunteerKeys.has(uniqueKey)) {
                            seenVolunteerKeys.add(uniqueKey);
                        }

                        const displayTime = volunteer.display_time ? ` (${volunteer.display_time})` : "";

                        // added for captain/admin symbol
                        const captainBadge = isCaptain(volunteer) ? " (C)" : "";
                        const adminBadge = isAdmin(volunteer) ? " (A)" : "";
                        const techBadge = isTech(volunteer) ? " (T)" : "";
                        return `
                            <button class="volunteer-pill" type="button" onclick='openVolunteerPanel(${JSON.stringify(JSON.stringify(volunteer))})'>
                                ${displayName}${captainBadge}${adminBadge}${techBadge}${displayTime}
                            </button>
                        `;
                    }).join("")}
                </div>
            `;
        } else {
            volunteerHTML = `<div class="empty-state">No volunteers assigned</div>`;
        }

        card.innerHTML = `
            <div class="card-top">
                <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
                    <h3>${stationName}</h3>
                </div>
                <div class="station-count">${volunteers.length === 1 ? "1 volunteer" : `${volunteers.length} volunteers`}</div>
            </div>
            ${volunteerHTML}
        `;

        grid.appendChild(card);
    });
}

// Reloads station board after each update
async function loadStationBoard() {
    try {
        const response = await fetch("/admin/debug-hourly-final");
        const stationData = await response.json();

        stationData.data

        if (!response.ok || stationData.error) {
            throw new Error(stationData.error || "Failed to load station board response.");
        }

        renderStationBoard(stationData);
    } catch (error) {
        document.getElementById("scheduleGrid").innerHTML = `
        <div style="background:white;border-radius:16px;padding:20px;border:1px solid #e2e8f0;">
            Failed to load station board ${error}.
        </div>
        `;
    }
}

async function loadSchedule() {
    const date = document.getElementById("datePicker").value;

    if (!date) {
        alert("Please select a date.");
        return;
    }

    try {
        const response = await fetch(`/api/schedule?date=${date}`);
        const data = await response.json();

        const converted = {};
        data.forEach(station => {
            converted[station.stationName] = {
                volunteers: station.volunteers || []
            };
        });

        renderStationBoard(converted);
    } catch (error) {
        alert("Could not load that schedule.");
    }
}

// Opens individual volunteer panel for single volunteer edits
function openVolunteerPanel(volunteerJson) {
    const volunteer = JSON.parse(volunteerJson);
    
    document.getElementById("detailName").style.display = "inline";
    document.getElementById("detailEmail").style.display = "block";
    document.getElementById("detailPhone").style.display = "block";

    currentVolunteer = volunteer;

    document.getElementById("detailName").textContent = volunteer.name || "Volunteer";
    document.getElementById("detailEmail").textContent = volunteer.email || "None listed";
    document.getElementById("detailPhone").textContent = formatPhonePretty(volunteer.phone) || "None listed";
    document.getElementById("detailCaptain").textContent = volunteer.captain_status || "Volunteer";
    document.getElementById("detailShift").textContent = volunteer.typical_shift || "None listed";
    document.getElementById("detailUnavailability").textContent = volunteer.unavailability || "None listed";
    document.getElementById("detailRestrictions").textContent = volunteer.capability_restrictions || "None listed";

    document.getElementById("detailPanel").classList.add("open");
    document.getElementById("detailOverlay").classList.add("open");
}

// Closes individual volunteer panel for single volunteer edits
function closeVolunteerPanel() {
    document.getElementById("detailPanel").classList.remove("open");
    document.getElementById("detailOverlay").classList.remove("open");

    document.getElementById("detailName").style.display = "inline";
    document.getElementById("detailEmail").style.display = "block";
    document.getElementById("detailPhone").style.display = "block";

    currentVolunteer = null;
}

function signOut() {
    var auth2 = gapi.auth2.getAuthInstance();
    auth2.signOut().then(function () {
        console.log('User signed out.');
    });
}

window.addEventListener("DOMContentLoaded", loadStationBoard);
</script>

<div id="detailOverlay" class="detail-overlay" onclick="closeVolunteerPanel()"></div>

<div id="detailPanel" class="detail-panel">
    <div class="detail-panel-header">
        <div class="detail-panel-title">
            <span id="detailName">Volunteer</span>
        </div>
        <div class="detail-panel-actions">
            <button class="detail-btn back" type="button" onclick="closeVolunteerPanel()">Back</button>
        </div>
    </div>

    <div class="detail-panel-body">
        <div class="detail-card">
            <div class="detail-label">Email</div>
            <div class="detail-value">
                <span id="detailEmail">—</span>
            </div>
        </div>

        <div class="detail-card">
            <div class="detail-label">Phone</div>
            <div class="detail-value">
                <span id="detailPhone">—</span>
            </div>
        </div>

        <div class="detail-card">
            <div class="detail-label">Captain Status</div>
            <div class="detail-value" id="detailCaptain">—</div>
        </div>

        <div class="detail-card">
            <div class="detail-label">Typical Shift</div>
            <div class="detail-value" id="detailShift">—</div>
        </div>

        <div class="detail-card">
            <div class="detail-label">Unavailability</div>
            <div class="detail-value" id="detailUnavailability">—</div>
        </div>

        <div class="detail-card">
            <div class="detail-label">Capability Restrictions</div>
            <div class="detail-value" id="detailRestrictions">—</div>
        </div>
    </div>
</div>
</body>
</html>
