<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background: #f3f6fb;
    color: #1e293b;
}

.header {
    background: #0f172a;
    color: white;
    padding: 24px 32px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    box-shadow: 0 10px 25px rgba(15, 23, 42, 0.18);
}

.header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 20px;
    flex-wrap: wrap;
}

.header-copy h1 {
    font-size: 32px;
    font-weight: 800;
    margin-bottom: 6px;
}

.header-tools {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
}

.date-picker {
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid #cbd5e1;
    font-size: 14px;
    background: white;
    color: #0f172a;
}
.detail-panel {
    position: fixed;
    top: 0;
    right: -460px;
    width: 420px;
    max-width: 92vw;
    height: 100vh;
    background: white;
    box-shadow: -10px 0 30px rgba(15, 23, 42, 0.2);
    z-index: 1000;
    transition: right 0.25s ease;
    display: flex;
    flex-direction: column;
}

.detail-panel.open {
    right: 0;
}

.detail-panel-header {
    padding: 22px 22px 16px;
    border-bottom: 1px solid #e2e8f0;
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: center;
}

.detail-panel-title {
    font-size: 22px;
    font-weight: 800;
    color: #0f172a;
}

.detail-panel-actions {
    display: flex;
    gap: 8px;
}

.detail-btn {
    border: none;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
}

.detail-btn.back {
    background: #e2e8f0;
    color: #0f172a;
}

.detail-btn.edit {
    background: #2563eb;
    color: white;
}

.detail-panel-body {
    padding: 22px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
}

.detail-card {
    border: 1px solid #e2e8f0;
    border-radius: 14px;
    padding: 16px;
    background: #f8fafc;
}

.detail-label {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: #64748b;
    margin-bottom: 6px;
}

.detail-value {
    font-size: 15px;
    font-weight: 600;
    color: #0f172a;
    word-break: break-word;
}

.detail-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.28);
    z-index: 999;
    display: none;
}

.detail-overlay.open {
    display: block;
}

.load-btn,
.header button {
    padding: 10px 16px;
    border-radius: 12px;
    border: none;
    background: #2563eb;
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s ease;
    font-size: 14px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
}

.load-btn:hover,
.header button:hover {
    background: #1d4ed8;
}

.secondary-btn {
    background: #475569 !important;
}

.secondary-btn:hover {
    background: #334155 !important;
}

.header-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

.icon {
    font-size: 18px;
    line-height: 1;
}

.label {
    font-size: 14px;
    font-weight: 600;
}

.page {
    padding: 32px;
}

.summary-bar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
}

.summary-card {
    background: white;
    border-radius: 16px;
    padding: 18px 20px;
    box-shadow: 0 10px 28px rgba(15, 23, 42, 0.07);
    border: 1px solid #e2e8f0;
}

.summary-label {
    color: #64748b;
    font-size: 13px;
    margin-bottom: 6px;
}

.summary-value {
    font-size: 28px;
    font-weight: 800;
    color: #0f172a;
}

.board-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
    gap: 12px;
    flex-wrap: wrap;
}

.board-header h2 {
    font-size: 24px;
    font-weight: 800;
    color: #0f172a;
}

.board-header p {
    color: #64748b;
    font-size: 14px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 22px;
}

.card {
    border-radius: 22px;
    padding: 22px;
    color: white;
    box-shadow: 0 14px 32px rgba(0,0,0,0.12);
    transition: transform 0.18s ease, box-shadow 0.18s ease;
    min-height: 220px;
    display: flex;
    flex-direction: column;
}

.card:hover {
    transform: translateY(-4px);
    box-shadow: 0 18px 36px rgba(0,0,0,0.16);
}

.card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 18px;
}

.card h3 {
    font-size: 20px;
    font-weight: 800;
    line-height: 1.2;
}

.station-count {
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.22);
    border-radius: 999px;
    padding: 6px 10px;
    font-size: 12px;
    font-weight: 700;
    white-space: nowrap;
}

.volunteer-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 4px;
}

.volunteer-pill {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 12px;
    padding: 10px 12px;
    font-size: 14px;
    font-weight: 600;
    line-height: 1.35;
    width: 100%;
    text-align: left;
    color: inherit;
    cursor: pointer;
    transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
}

.volunteer-pill:hover {
    transform: translateY(-2px);
    background: rgba(255,255,255,0.28);
    border-color: rgba(255,255,255,0.4);
}

.volunteer-pill:focus {
    outline: 2px solid rgba(255,255,255,0.65);
    outline-offset: 2px;
}

.empty-state {
    margin-top: 6px;
    background: rgba(255,255,255,0.12);
    border: 1px dashed rgba(255,255,255,0.28);
    border-radius: 12px;
    padding: 14px;
    font-size: 14px;
    color: rgba(255,255,255,0.9);
}

.coverage-box {
    display: none;
    background: white;
    border: 1px solid #e2e8f0;
    border-radius: 18px;
    padding: 22px;
    margin-top: 26px;
    box-shadow: 0 12px 28px rgba(15, 23, 42, 0.08);
}

.coverage-box h3 {
    font-size: 20px;
    margin-bottom: 8px;
    color: #0f172a;
}

.coverage-box p {
    color: #64748b;
    font-size: 14px;
    margin-bottom: 14px;
}

.coverage-controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

.coverage-box select {
    min-width: 260px;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid #cbd5e1;
    font-size: 14px;
    background: white;
}

.coverage-box button {
    padding: 10px 16px;
    border-radius: 10px;
    border: none;
    background: #dc2626;
    color: white;
    font-weight: 700;
    cursor: pointer;
}

.coverage-box button:hover {
    background: #b91c1c;
}

.setup { background: linear-gradient(135deg,#0ea5e9,#0284c7); }
.teardown { background: linear-gradient(135deg,#6366f1,#4f46e5); }
.servers { background: linear-gradient(135deg,#ef4444,#dc2626); }
.kitchen { background: linear-gradient(135deg,#22c55e,#16a34a); }
.drinks { background: linear-gradient(135deg,#f97316,#ea580c); }
.desserts { background: linear-gradient(135deg,#facc15,#eab308); color: #1e293b; }
.busboys { background: linear-gradient(135deg,#ec4899,#db2777); }
.dishes { background: linear-gradient(135deg,#06b6d4,#0891b2); }
.reserve { background: linear-gradient(135deg,#94a3b8,#64748b); }
.manager { background: linear-gradient(135deg,#111827,#1f2937); }
.greeters { background: linear-gradient(135deg,#14b8a6,#0d9488); }
.potato { background: linear-gradient(135deg,#a16207,#854d0e); }
.salad { background: linear-gradient(135deg,#65a30d,#4d7c0f); }
.absent { background: linear-gradient(135deg,#dc2626,#7f1d1d); }
.other { background: linear-gradient(135deg,#64748b,#475569); }

.desserts .station-count,
.desserts .volunteer-pill,
.desserts .empty-state {
    color: #1e293b;
    background: rgba(255,255,255,0.4);
    border-color: rgba(255,255,255,0.45);
}

@media (max-width: 768px) {
    .header,
    .page {
        padding: 20px 16px;
    }

    .header-copy h1 {
        font-size: 26px;
    }

    .grid {
        grid-template-columns: 1fr;
    }
}
</style>
</head>
<body>

<div class="header">
    <div class="header-top">
        <div class="header-copy">
            <h1>Admin Dashboard</h1>
        </div>

        <div class="header-tools">
            <input type="date" id="datePicker" class="date-picker">
            <button class="load-btn" onclick="loadSchedule()">
                <span class="icon">📅</span>
                <span class="label">Load Date</span>
            </button>
        </div>
    </div>

    <div class="header-actions">
        <button onclick="window.location.href='/admin/inbox'">
            <span class="icon">📬</span>
            <span class="label">Inbox</span>
        </button>

        <button onclick="enableEdit()">
            <span class="icon">✏️</span>
            <span class="label">Edit</span>
        </button>

        <button onclick="window.print()">
            <span class="icon">🖨️</span>
            <span class="label">Print</span>
        </button>

        <button onclick="window.location.href='/admin/volunteer-hours'">
            <span class="icon">⏱️</span>
            <span class="label">Hourly View</span>
        </button>

        <button class="secondary-btn" onclick="requestCoverage()">
            <span class="icon">🚨</span>
            <span class="label">Need Coverage?</span>
        </button>

        <button onclick="window.location.href='/admin/master-list'">
            <span class="icon">👥</span>
            <span class="label">Volunteer Master List</span>
        </button>
    </div>
</div>

<div class="page">
    <div class="summary-bar">
        <div class="summary-card">
            <div class="summary-label">Total Volunteers</div>
            <div class="summary-value" id="totalVolunteersCount">0</div>
        </div>
        <div class="summary-card">
            <div class="summary-label">Assigned Volunteers</div>
            <div class="summary-value" id="assignedVolunteersCount">0</div>
        </div>
        <div class="summary-card">
            <div class="summary-label">Total Captains</div>
            <div class="summary-value" id="captainsCount">0</div>
        </div>
        <div class="summary-card">
            <div class="summary-label">Available Reserves</div>
            <div class="summary-value" id="reserveCount">0</div>
        </div>
    </div>

    <div class="board-header">
        <div>
            <h2>Station Board</h2>
            <p>All stations with the volunteers currently assigned to each one.</p>
        </div>
    </div>

    <div class="grid" id="scheduleGrid"></div>

    <div id="coverageBox" class="coverage-box">
        <h3>Request Coverage</h3>
        <p>Select the volunteer who will be absent.</p>

        <div class="coverage-controls">
            <select id="absentSelect">
                {% for v in volunteers %}
                    <option value="{{ v.id }}">
                        {{ v.first_name }} {{ v.last_name }}
                    </option>
                {% endfor %}
            </select>

            <button onclick="submitAbsent()">Next</button>
        </div>
    </div>
</div>

<script>
const stationClassMap = {
    "Setup Team": "setup",
    "Teardown Team": "teardown",
    "Line Servers": "servers",
    "Kitchen": "kitchen",
    "Drink Station": "drinks",
    "Desserts": "desserts",
    "Busboys/sanitation": "busboys",
    "Dishwashers": "dishes",
    "Reserve": "reserve",
    "General Manager": "manager",
    "Greeters": "greeters",
    "Baked Potato Bar": "potato",
    "Salad Bar": "salad",
    "Absent": "absent",
    "Other": "other"
};

function formatCountLabel(count) {
    return count === 1 ? "1 volunteer" : `${count} volunteers`;
}

function getVolunteerDisplayName(volunteer) {
    if (typeof volunteer === "string") return volunteer;
    return volunteer.name || `${volunteer.firstName || ""} ${volunteer.lastName || ""}`.trim();
}

function isCaptain(volunteer) {
    if (!volunteer || typeof volunteer === "string") return false;

    const captainStatus = (volunteer.captain_status || volunteer.captainStatus || "").toString().toLowerCase();
    const role = (volunteer.role || "").toString().toLowerCase();

    return captainStatus === "captain" || role === "captain";
}

function renderStationBoard(stationData) {
    const grid = document.getElementById("scheduleGrid");
    grid.innerHTML = "";

    const stationNames = Object.keys(stationData);
    let totalVolunteers = 0;
    let assignedVolunteers = 0;
    let captainsCount = 0;
    let reserveCount = 0;

    const seenVolunteerKeys = new Set();
    const seenCaptainKeys = new Set();

    stationNames.forEach(stationName => {
        if (stationName === "Other") return;

        const station = stationData[stationName];
        const volunteers = station.volunteers || [];

        totalVolunteers += volunteers.length;

        if (stationName === "Reserve") {
            reserveCount = volunteers.length;
        } else {
            assignedVolunteers += volunteers.length;
        }

        const card = document.createElement("div");
        const cssClass = stationClassMap[stationName];
        if (!cssClass) return;

        card.className = `card ${cssClass}`;

        let volunteerHTML = "";

        if (volunteers.length > 0) {
            volunteerHTML = `
                <div class="volunteer-list">
                    ${volunteers.map(volunteer => {
                        const displayName = getVolunteerDisplayName(volunteer);
                        const uniqueKey =
                            typeof volunteer === "string"
                                ? displayName
                                : (volunteer.id ?? displayName);

                        if (!seenVolunteerKeys.has(uniqueKey)) {
                            seenVolunteerKeys.add(uniqueKey);
                        }

                        if (isCaptain(volunteer) && !seenCaptainKeys.has(uniqueKey)) {
                            seenCaptainKeys.add(uniqueKey);
                            captainsCount += 1;
                        }

                        return `
                            <button class="volunteer-pill" type="button" onclick='openVolunteerPanel(${JSON.stringify(JSON.stringify(volunteer))})'>
                                ${displayName}
                            </button>
                        `;
                    }).join("")}
                </div>
            `;
        } else {
            volunteerHTML = `<div class="empty-state">No volunteers assigned</div>`;
        }

        card.innerHTML = `
            <div class="card-top">
                <h3>${stationName}</h3>
                <div class="station-count">${formatCountLabel(volunteers.length)}</div>
            </div>
            ${volunteerHTML}
        `;

        grid.appendChild(card);
    });

    document.getElementById("totalVolunteersCount").textContent = totalVolunteers;
    document.getElementById("assignedVolunteersCount").textContent = assignedVolunteers;
    document.getElementById("captainsCount").textContent = captainsCount;
    document.getElementById("reserveCount").textContent = reserveCount;
}

async function loadStationBoard() {
    try {
        const response = await fetch("/admin/debug-hourly-final");
        const stationData = await response.json();

        if (!response.ok || stationData.error) {
            throw new Error(stationData.error || "Failed to load station board.");
        }

        renderStationBoard(stationData);
    } catch (error) {
        document.getElementById("scheduleGrid").innerHTML = `
            <div style="background:white;border-radius:16px;padding:20px;border:1px solid #e2e8f0;">
                Failed to load station board.
            </div>
        `;
    }
}

async function loadSchedule() {
    const date = document.getElementById("datePicker").value;

    if (!date) {
        alert("Please select a date.");
        return;
    }

    try {
        const response = await fetch(`/api/schedule?date=${date}`);
        const data = await response.json();

        const converted = {};
        data.forEach(station => {
            converted[station.stationName] = {
                volunteers: station.volunteers || []
            };
        });

        renderStationBoard(converted);
    } catch (error) {
        alert("Could not load that schedule.");
    }
}

function enableEdit() {
    alert("Edit mode placeholder.");
}

function requestCoverage() {
    document.getElementById("coverageBox").style.display = "block";
}

function submitAbsent() {
    const selected = document.getElementById("absentSelect").value;
    alert(`Coverage flow placeholder for volunteer ID ${selected}`);
}

function openVolunteerPanel(volunteerJson) {
    const volunteer = JSON.parse(volunteerJson);

    document.getElementById("detailName").textContent = volunteer.name || "Volunteer";
    document.getElementById("detailEmail").textContent = volunteer.email || "None listed";
    document.getElementById("detailPhone").textContent = volunteer.phone || "None listed";
    document.getElementById("detailCaptain").textContent = volunteer.captain_status || "Volunteer";

    document.getElementById("detailPanel").classList.add("open");
    document.getElementById("detailOverlay").classList.add("open");
}

function closeVolunteerPanel() {
    document.getElementById("detailPanel").classList.remove("open");
    document.getElementById("detailOverlay").classList.remove("open");
}

function editVolunteer() {
    alert("Edit feature not wired yet.");
}

window.addEventListener("DOMContentLoaded", loadStationBoard);
</script>
<div id="detailOverlay" class="detail-overlay" onclick="closeVolunteerPanel()"></div>

<div id="detailPanel" class="detail-panel">
    <div class="detail-panel-header">
        <div class="detail-panel-title" id="detailName">Volunteer</div>
        <div class="detail-panel-actions">
            <button class="detail-btn back" type="button" onclick="closeVolunteerPanel()">Back</button>
            <button class="detail-btn edit" type="button" onclick="editVolunteer()">Edit</button>
        </div>
    </div>

    <div class="detail-panel-body">
        <div class="detail-card">
            <div class="detail-label">Email</div>
            <div class="detail-value" id="detailEmail">—</div>
        </div>

        <div class="detail-card">
            <div class="detail-label">Phone</div>
            <div class="detail-value" id="detailPhone">—</div>
        </div>

        <div class="detail-card">
            <div class="detail-label">Captain Status</div>
            <div class="detail-value" id="detailCaptain">—</div>
        </div>
    </div>
</div>
</body>
</html>
