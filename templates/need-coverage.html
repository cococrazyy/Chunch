<!-- 
    This file contains the HTML and JavaScript code that creates the coverage‑request
    page for captains and admins. It allows selecting a volunteer, specifying full
    or partial‑shift absences, and submitting the request for coverage.
-->
<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Request Coverage</title>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    
    <!-- Import page stylesheet -->
    <link rel="stylesheet" href="/style/coverage.css">
</head>
<body>

<div class="container">
    <h2>Request Coverage</h2>
    <p>Select the volunteer and absence details.</p>

    <!-- Coverage request form -->
    <form method="POST" action="/admin/need-coverage/save">

        <div class="field">
            <label for="volunteer_id">Volunteer</label>

            <!-- Volunteer dropdown (enhanced with Select2) -->
            <select id="volunteer_id" name="volunteer_id" required>
                <option></option> <!-- placeholder -->
                {% for v in volunteers %}
                    <option value="{{ v.id }}">
                        {{ v.first_name }} {{ v.last_name }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <!-- Date range selection -->
        <div class="inline-row">
            <div class="field">
                <label for="start_date">Start Date</label>
                <input type="date" id="start_date" name="start_date" required>
            </div>

            <div class="field">
                <label for="end_date">End Date</label>
                <input type="date" id="end_date" name="end_date" required>
            </div>
        </div>

        <!-- Absence type selector -->
        <div class="field">
            <label for="is_partial">Absence Type</label>
            <select id="is_partial" name="is_partial" onchange="togglePartialFields()" required>
                <option value="false">Full Shift</option>
                <option value="true">Partial Shift</option>
            </select>
        </div>

        <!-- Partial‑shift hour fields -->
        <div id="partialFields">
            <div class="inline-row">
                <div class="field">
                    <label for="partial_start_hour">Partial Start Hour</label>
                    <input type="number" id="partial_start_hour" name="partial_start_hour" min="5" max="16">
                </div>

                <div class="field">
                    <label for="partial_end_hour">Partial End Hour</label>
                    <input type="number" id="partial_end_hour" name="partial_end_hour" min="5" max="16">
                </div>
            </div>
        </div>

        <!-- Optional notes -->
        <div class="field">
            <label for="notes">Notes</label>
            <textarea id="notes" name="notes" rows="3" placeholder="Optional"></textarea>
        </div>

        <!-- Form actions -->
        <div class="actions">
            <button class="request" id="primary" type="submit">Save Absence</button>
            <button class="request" id="secondary" type="button" onclick="window.location.href='/admin'">Back</button>
        </div>
    </form>
</div>

<!-- Select2 + jQuery dependencies -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<script>
// Show/hide partial‑shift hour fields
function togglePartialFields() {
    const isPartial = document.getElementById("is_partial").value === "true";
    document.getElementById("partialFields").style.display = isPartial ? "block" : "none";
}

// Autofill form fields from URL parameters (used when navigating from dashboards)
function autofillFromURL() {
    const params = new URLSearchParams(window.location.search);

    const volunteerId = params.get("volunteer_id");
    const startDate = params.get("start_date");
    const endDate = params.get("end_date");

    // Convert MM/DD/YYYY → YYYY-MM-DD for date inputs
    function formatDate(dateStr) {
        if (!dateStr) return "";
        const parts = dateStr.split("/");
        if (parts.length !== 3) return dateStr;

        const [month, day, year] = parts;
        return `${year}-${month.padStart(2, '0')}-${day.padStart(2, '0')}`;
    }

    if (startDate) {
        document.getElementById("start_date").value = formatDate(startDate);
    }

    if (endDate) {
        document.getElementById("end_date").value = formatDate(endDate);
    }

    if (volunteerId) {
        const select = document.getElementById("volunteer_id");
        select.value = volunteerId;

        // Required for Select2 to visually update
        $('#volunteer_id').trigger('change');
    }
}

// Initialize Select2 and apply autofill
$(document).ready(function() {
    $('#volunteer_id').select2({
        placeholder: "Type to search a volunteer",
        allowClear: true,
        width: '100%',

        // Custom name‑matching logic for better search
        matcher: function(params, data) {
            if ($.trim(params.term) === '') {
                return data;
            }

            const query = params.term.toLowerCase();
            const text = data.text.toLowerCase();

            // Split full name into parts and match any part
            const parts = text.split(" ");
            const match = parts.some(part => part.startsWith(query));

            return match ? data : null;
        }
    });

    autofillFromURL();
});
</script>

</body>
</html>
