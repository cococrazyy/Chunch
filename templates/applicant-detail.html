<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Applicant Detail</title>

  <!-- Import style -->
  <link rel="stylesheet" href="/style/application.css">
</head>
<body>
  <div class="card">
    <h1>{{ applicant.first_name }} {{ applicant.last_name }}</h1>

    <div class="row">
      <div class="label">Email</div>
      <div>{{ applicant.email }}</div>
    </div>

    <div class="row">
      <div class="label">Phone Number</div>
      <div>{{ applicant.phone }}</div>
    </div>

    <div class="row">
      <div class="label">Member</div>
      <div>{{ applicant.availability }}</div>
    </div>

    <div class="row">
      <div class="label">Unavailability</div>
      <div>{{ applicant.unavailability }}</div>
    </div>

    <div class="row">
      <div class="label">Status</div>
      <div>{{ applicant.status }}</div>
    </div>

    <div class="actions">
      <form method="POST" action="/admin/inbox/accept/{{ applicant.id }}">
        <button class="accept" type="submit" onclick="return confirm('Accept this applicant?')">Accept</button>
      </form>

      <form method="POST" action="/admin/inbox/reject/{{ applicant.id }}">
        <button class="reject" type="submit" onclick="return confirm('Reject this applicant?')">Reject</button>
      </form>

      <a class="back-link" href="/admin/inbox">Back to Inbox</a>
    </div>
  </div>
</body>
</html>
